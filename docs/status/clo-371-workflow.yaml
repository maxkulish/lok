      - confidence: high
        text: >-
          The conductor and other non-Step callers can tolerate StepContext being constructed inline from local
          variables.
        verification: Compiler will reject any mismatch; CLO-372 (FR-20b) refines them later.
      - confidence: high
        text: >-
          #[async_trait] handles lifetime elision on StepContext<'_> the same way it handled &str + &Path +
          Option<&str>.
        verification: Verified by compiling one backend before full migration.
      - confidence: high
        text: All five backends live in the same repo, so a single PR can migrate them lockstep.
        verification: Verified by ls src/backend/. Bedrock is feature-gated but present.
      - confidence: high
        text: Step struct does not need new fields for this PR; we only change the plumbing shape, not the config surface.
        verification: Step already has model and timeout. sandbox, schema, options, history_window are future CLOs.
      - confidence: medium
        text: cargo check --features bedrock passes today against the current trait.
        verification: Run cargo check --features bedrock before opening PR; if drifted, reconcile in this PR.
      - confidence: high
        text: >-
          Empty history, None sandbox/schema, and empty options are safe defaults that produce Phase-1-equivalent
          behavior.
        verification: Each backend today ignores these concepts; passing empty/Nones is a no-op.
      - confidence: medium
        text: Downstream crate consumers (rs-wisper) do not implement Backend; they only call it via Arc<dyn Backend>.
        verification: >-
          PRD risk matrix lists this as Likelihood: L (single repo). Verified by grepping rs-wisper source for impl
          Backend.
      - confidence: high
        text: >-
          Default health_check impl returning Ok(()) when is_available() is true is sufficient for the one test we need
          in this PR.
        verification: Real health checks (FR-9..15) are a future CLO; this PR only adds the trait surface.
